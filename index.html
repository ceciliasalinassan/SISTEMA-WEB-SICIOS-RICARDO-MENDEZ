<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Socios Club Ricardo Méndez</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#050505;color:#fff;min-height:100vh}
body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 80% 0%,rgba(234,179,8,.22),transparent 30%),radial-gradient(circle at 0% 90%,rgba(234,179,8,.12),transparent 35%);pointer-events:none}
.app{display:flex;min-height:100vh;position:relative}
.sidebar{width:290px;background:rgba(0,0,0,.88);border-right:1px solid rgba(234,179,8,.35);display:flex;flex-direction:column}
.logoBox{height:270px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid rgba(234,179,8,.25)}
.logo{max-width:190px;max-height:190px;object-fit:contain}
.nav{padding:24px;display:flex;flex-direction:column;gap:12px}
.nav button{background:transparent;color:#fff;border:0;text-align:left;padding:15px 18px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}
.nav button.active,.nav button:hover{background:rgba(234,179,8,.22);color:#facc15}
.logout{margin:24px;margin-top:auto;background:transparent;border:1px solid #eab308;color:#facc15;padding:14px;border-radius:12px;font-weight:900;cursor:pointer}
.main{flex:1;padding:34px;overflow:auto}
.header{display:flex;justify-content:space-between;gap:20px;margin-bottom:28px;align-items:flex-start}
.brand{display:flex;gap:18px;align-items:center}
.logoSmall{width:72px;height:72px;object-fit:contain}
.kicker{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:#aaa;font-weight:800}
h1{font-size:54px;line-height:.95;font-style:italic;color:#facc15;text-shadow:0 0 24px rgba(234,179,8,.25)}
.lema{font-size:12px;letter-spacing:.35em;text-transform:uppercase;color:#aaa;margin-top:10px}
.admin{font-weight:900}
.card{background:linear-gradient(145deg,rgba(25,25,25,.97),rgba(5,5,5,.97));border:1px solid rgba(234,179,8,.20);box-shadow:0 25px 70px rgba(0,0,0,.45);border-radius:18px;padding:22px}
.hero{position:relative;overflow:hidden;margin-bottom:24px;min-height:210px;display:flex;align-items:center}
.hero:after{content:"FÚTBOL";position:absolute;right:-20px;bottom:-45px;font-size:140px;font-weight:900;font-style:italic;color:rgba(234,179,8,.08)}
.hero .title{color:#facc15;font-weight:900;letter-spacing:.3em;text-transform:uppercase;margin-bottom:15px}
.hero p{color:#ccc;max-width:720px;line-height:1.5}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px}
.kpi p{color:#aaa;text-transform:uppercase;font-size:12px;font-weight:900}
.kpi h2{color:#facc15;font-size:32px;margin-top:10px}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
h3{font-size:20px;text-transform:uppercase;margin-bottom:18px}
table{width:100%;border-collapse:collapse}
td,th{padding:14px;border-bottom:1px solid #27272a;text-align:left}
input,select{background:#111;border:1px solid rgba(234,179,8,.35);color:#fff;border-radius:12px;padding:14px;width:100%;font-weight:700}
.formgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:900;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block}
.gold{background:linear-gradient(90deg,#fde68a,#eab308,#a16207);color:#000}
.dark{background:#18181b;color:#fff;border:1px solid #333}
.green{background:#15803d;color:#fff}
.red{background:#dc2626;color:#fff}
.small{font-size:12px;padding:8px 10px;margin:2px}
.quick{display:flex;flex-direction:column;gap:10px}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative}
.loginCard{max-width:440px;width:100%;text-align:center}
.loginCard img{width:190px;height:190px;object-fit:contain}
.loginCard h1{font-size:48px;margin:18px 0}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:99;padding:20px}
.modal.show{display:flex}
.receipt{background:white;color:black;max-width:720px;width:100%;border:8px solid #eab308;border-radius:20px;padding:32px}
.receipt h2{font-size:30px;color:#000;text-shadow:none}
.credential{width:560px;height:330px;background:#000;color:#fff;border:4px solid #eab308;border-radius:28px;padding:28px;position:relative;overflow:hidden}
.credential:after{content:"RM";position:absolute;right:-25px;bottom:-50px;font-size:150px;color:rgba(234,179,8,.12);font-weight:900;font-style:italic}
.credential h2{font-size:38px;margin-top:40px;color:#fff}
@media(max-width:900px){
 .sidebar{display:none}.main{padding:18px}
 h1{font-size:34px}.grid5,.grid,.formgrid{grid-template-columns:1fr}.header{flex-direction:column}
 table{font-size:13px}.logoSmall{width:56px;height:56px}
}
@media print{
 body *{visibility:hidden}
 #receiptPrint,#receiptPrint *,#credentialPrint,#credentialPrint *{visibility:visible}
 #receiptPrint,#credentialPrint{position:absolute;left:0;top:0}
}
</style>
</head>

gEAmFu8f8AEfghFboJkvAAAAAASUVORK5CYII=" alt="Logo">
        <div>
          <div class="kicker" id="clubNameHeader">Club Deportivo Ricardo Méndez</div>
          <h1>GESTIÓN DEPORTIVA PREMIUM</h1>
          <div class="lema" id="clubLemaHeader">Disciplina • Unión • Pasión</div>

    <section id="dashboard" class="view"></section>
    <section id="socios" class="view" style="display:none"></section>
    <section id="pagos" class="view" style="display:none"></section>
    <section id="morosos" class="view" style="display:none"></section>
    <section id="credenciales" class="view" style="display:none"></section>
    <section id="config" class="view" style="display:none"></section>
    <section id="reportes" class="view" style="display:none"></section>
  </main>

<div id="modal" class="modal"></div>

<script>
let club = JSON.parse(localStorage.getItem('clubRM')) || {
  nombre:'Club Deportivo Ricardo Méndez',
  lema:'Disciplina • Unión • Pasión',
  cuota:5000,
  whatsapp:'+56994413797'
}

let socios = JSON.parse(localStorage.getItem('sociosRM')) || [
  {id:1,codigo:'RM-001',nombre:'Juan Pérez',rut:'12.345.678-9',telefono:'+56 9 1234 5678',categoria:'Socio',estado:'Activo',cuota:5000},
  {id:2,codigo:'RM-002',nombre:'Camila Torres',rut:'18.456.321-5',telefono:'+56 9 8765 4321',categoria:'Apoderado',estado:'Activo',cuota:5000},
  {id:3,codigo:'RM-003',nombre:'Diego Muñoz',rut:'16.222.333-4',telefono:'+56 9 3333 2222',categoria:'Jugador',estado:'Activo',cuota:5000}
]

let pagos = JSON.parse(localStorage.getItem('pagosRM')) || [
  {id:1,socioId:1,socio:'Juan Pérez',mes:'Mayo',anio:'2025',monto:5000,fecha:'2025-05-21',medio:'Transferencia',comprobante:'RM-0001'},
  {id:2,socioId:2,socio:'Camila Torres',mes:'Mayo',anio:'2025',monto:5000,fecha:'2025-05-20',medio:'Efectivo',comprobante:'RM-0002'}
]

let editId = null

function saveAll(){
  localStorage.setItem('clubRM',JSON.stringify(club))
  localStorage.setItem('sociosRM',JSON.stringify(socios))
  localStorage.setItem('pagosRM',JSON.stringify(pagos))
}

function money(v){return new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0}).format(Number(v||0))}
function login(){document.getElementById('login').style.display='none';document.getElementById('app').style.display='flex';renderAll()}
function logout(){document.getElementById('login').style.display='flex';document.getElementById('app').style.display='none'}
function showView(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.style.display='none')
  document.getElementById(id).style.display='block'
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'))
  if(btn)btn.classList.add('active')
  renderAll()
}

function paidIds(){
  return new Set(pagos.filter(p=>p.mes==='Mayo' && p.anio==='2025').map(p=>p.socioId))
}

function stats(){
  const paid = paidIds()
  const activos = socios.filter(s=>s.estado==='Activo')
  const morosos = activos.filter(s=>!paid.has(s.id))
  return {
    total:socios.length,
    activos:activos.length,
    pagados:paid.size,
    morosos:morosos.length,
    recaudado:pagos.reduce((a,p)=>a+Number(p.monto||0),0),
    deuda:morosos.reduce((a,s)=>a+Number(s.cuota||club.cuota),0)
  }
}

function renderAll(){
  document.getElementById('clubNameHeader').innerText=club.nombre
  document.getElementById('clubLemaHeader').innerText=club.lema
  renderDashboard(); renderSocios(); renderPagos(); renderMorosos(); renderCredenciales(); renderConfig(); renderReportes()
}

function renderDashboard(){
  const s=stats()
  document.getElementById('dashboard').innerHTML=`
    <div class="card hero">
      <div>
        <div class="title">Gestión Deportiva Premium</div>
        <p>Sistema web para socios, pagos, morosos, credenciales digitales, QR, reportes, comprobantes PDF y cobro por WhatsApp.</p>
        <button class="btn gold" style="margin-top:20px" onclick="showView('socios')">Nuevo socio</button>
      </div>
    </div>
    <div class="grid5">
      <div class="card kpi"><p>Total socios</p><h2>${s.total}</h2></div>
      <div class="card kpi"><p>Socios activos</p><h2>${s.activos}</h2></div>
      <div class="card kpi"><p>Pagados mes</p><h2>${s.pagados}</h2></div>
      <div class="card kpi"><p>Socios en mora</p><h2>${s.morosos}</h2></div>
      <div class="card kpi"><p>Recaudación</p><h2>${money(s.recaudado)}</h2></div>
    </div>
    <div class="grid">
      <div class="card">
        <h3>Últimos pagos registrados</h3>
        ${tablaPagos(pagos)}
      </div>
      <div class="card quick">
        <h3>Accesos rápidos</h3>
        <button class="btn dark" onclick="showView('socios')">Nuevo socio</button>
        <button class="btn dark" onclick="showView('pagos')">Registrar pago</button>
        <button class="btn green" onclick="exportCSV()">Exportar Excel</button>
      </div>
    </div>`
}

function renderSocios(){
  document.getElementById('socios').innerHTML=`
    <div class="card">
      <h3>${editId?'Editar socio':'Registrar socio'}</h3>
      <div class="formgrid">
        <input id="codigo" placeholder="Código">
        <input id="nombre" placeholder="Nombre">
        <input id="rut" placeholder="RUT">
        <input id="telefono" placeholder="Teléfono WhatsApp">
        <input id="cuota" type="number" placeholder="Cuota">
        <select id="categoria"><option>Socio</option><option>Jugador</option><option>Apoderado</option><option>Dirigente</option></select>
      </div>
      <button class="btn gold" onclick="guardarSocio()">${editId?'Guardar cambios':'Guardar socio'}</button>
    </div>
    <div class="card" style="margin-top:20px">
      <h3>Base de datos de socios</h3>
      <input id="buscar" placeholder="Buscar socio..." oninput="filtrarSocios()" style="margin-bottom:15px">
      <div id="tablaSocios"></div>
    </div>`
  if(editId){
    const s=socios.find(x=>x.id===editId)
    if(s){codigo.value=s.codigo;nombre.value=s.nombre;rut.value=s.rut;telefono.value=s.telefono;cuota.value=s.cuota;categoria.value=s.categoria}
  }
  filtrarSocios()
}

function filtrarSocios(){
  const q=(document.getElementById('buscar')?.value||'').toLowerCase()
  const list=socios.filter(s=>(s.codigo+s.nombre+s.rut+s.telefono+s.categoria).toLowerCase().includes(q))
  document.getElementById('tablaSocios').innerHTML=tablaSocios(list)
}

function tablaSocios(list){
  const paid=paidIds()
  return `<div style="overflow:auto"><table><tbody>${list.map(s=>`
    <tr>
      <td style="color:#facc15;font-weight:900">${s.codigo}</td>
      <td><b>${s.nombre}</b></td>
      <td>${s.rut}</td>
      <td>${money(s.cuota)}</td>
      <td>${paid.has(s.id)?'Pagado':'Pendiente'}</td>
      <td>
        <button class="btn small gold" onclick="editarSocio(${s.id})">Editar</button>
        <button class="btn small dark" onclick="abrirQR(${s.id})">QR</button>
        <button class="btn small dark" onclick="abrirCredencial(${s.id})">Credencial</button>
        <a class="btn small green" href="${wsp(s)}" target="_blank">WhatsApp</a>
        <button class="btn small red" onclick="eliminarSocio(${s.id})">Eliminar</button>
      </td>
    </tr>`).join('')}</tbody></table></div>`
}

function guardarSocio(){
  const data={
    id: editId || Date.now(),
    codigo: codigo.value || `RM-${String(socios.length+1).padStart(3,'0')}`,
    nombre: nombre.value,
    rut: rut.value,
    telefono: telefono.value,
    categoria: categoria.value,
    estado:'Activo',
    cuota: Number(cuota.value || club.cuota)
  }
  if(!data.nombre||!data.rut)return alert('Ingrese nombre y RUT')
  if(editId){socios=socios.map(s=>s.id===editId?data:s);pagos=pagos.map(p=>p.socioId===editId?{...p,socio:data.nombre}:p)}
  else socios.push(data)
  editId=null;saveAll();renderAll()
}

function editarSocio(id){editId=id;showView('socios')}
function eliminarSocio(id){if(confirm('¿Eliminar socio y sus pagos?')){socios=socios.filter(s=>s.id!==id);pagos=pagos.filter(p=>p.socioId!==id);saveAll();renderAll()}}

function renderPagos(){
  document.getElementById('pagos').innerHTML=`
    <div class="card">
      <h3>Registrar pago mensual</h3>
      <div class="formgrid">
        <select id="pSocio">${socios.map(s=>`<option value="${s.id}">${s.nombre}</option>`).join('')}</select>
        <select id="pMes">${['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'].map(m=>`<option ${m==='Mayo'?'selected':''}>${m}</option>`).join('')}</select>
        <input id="pAnio" value="2025">
        <input id="pMonto" type="number" value="${club.cuota}">
        <input id="pFecha" type="date" value="${new Date().toISOString().slice(0,10)}">
        <select id="pMedio"><option>Efectivo</option><option>Transferencia</option><option>Tarjeta</option></select>
      </div>
      <button class="btn gold" onclick="registrarPago()">Registrar pago y generar PDF</button>
    </div>
    <div class="card" style="margin-top:20px"><h3>Historial de pagos</h3>${tablaPagos(pagos)}</div>`
}

function registrarPago(){
  const socio=socios.find(s=>String(s.id)===String(pSocio.value))
  if(!socio)return
  const p={id:Date.now(),socioId:socio.id,socio:socio.nombre,mes:pMes.value,anio:pAnio.value,monto:Number(pMonto.value),fecha:pFecha.value,medio:pMedio.value,comprobante:`RM-${String(pagos.length+1).padStart(4,'0')}`}
  pagos=[p,...pagos];saveAll();renderAll();abrirComprobante(p.id)
}

function tablaPagos(list){
  return `<div style="overflow:auto"><table><tbody>${list.map(p=>`
    <tr>
      <td><b>${p.socio}</b></td><td>${p.fecha}</td><td>${money(p.monto)}</td>
      <td><button class="btn small green" onclick="abrirComprobante(${p.id})">Descargar PDF</button></td>
    </tr>`).join('')}</tbody></table></div>`
}

function renderMorosos(){
  const list=socios.filter(s=>s.estado==='Activo'&&!paidIds().has(s.id))
  document.getElementById('morosos').innerHTML=`<div class="card"><h3>Cobranza de morosos</h3><table><tbody>${list.map(s=>`<tr><td><b>${s.nombre}</b></td><td>${s.rut}</td><td>${money(s.cuota)}</td><td><a class="btn small green" href="${wsp(s)}" target="_blank">WhatsApp</a></td></tr>`).join('')}</tbody></table></div>`
}

function renderCredenciales(){
  document.getElementById('credenciales').innerHTML=`<div class="card"><h3>Credenciales digitales</h3><div class="grid5">${socios.map(s=>`<button class="card" onclick="abrirCredencial(${s.id})"><b style="color:#facc15">${s.codigo}</b><br>${s.nombre}<br><span style="color:#aaa">${s.categoria}</span></button>`).join('')}</div></div>`
}

function renderConfig(){
  document.getElementById('config').innerHTML=`
    <div class="card"><h3>Configuración del club</h3>
    <div class="formgrid">
      <input id="cNombre" value="${club.nombre}">
      <input id="cLema" value="${club.lema}">
      <input id="cCuota" type="number" value="${club.cuota}">
      <input id="cWhatsapp" value="${club.whatsapp}">
    </div>
    <button class="btn gold" onclick="guardarConfig()">Guardar configuración</button></div>`
}

function guardarConfig(){
  club={nombre:cNombre.value,lema:cLema.value,cuota:Number(cCuota.value),whatsapp:cWhatsapp.value}
  saveAll();renderAll()
}

function renderReportes(){
  const s=stats()
  document.getElementById('reportes').innerHTML=`<div class="card"><h3>Reportes</h3><div class="grid5"><div class="card kpi"><p>Recaudación</p><h2>${money(s.recaudado)}</h2></div><div class="card kpi"><p>Deuda</p><h2>${money(s.deuda)}</h2></div><div class="card kpi"><p>Morosos</p><h2>${s.morosos}</h2></div></div><button class="btn green" onclick="exportCSV()">Exportar Excel / CSV</button></div>`
}

function wsp(s){
  const phone=s.telefono.replace(/[^0-9]/g,'')
  const msg=encodeURIComponent(`Hola ${s.nombre}, le recordamos que mantiene pendiente el pago de su cuota mensual del ${club.nombre}. Monto: ${money(s.cuota)}.`)
  return `https://wa.me/${phone}?text=${msg}`
}

function abrirComprobante(id){
  const p=pagos.find(x=>x.id===id)
  modal.innerHTML=`<div id="receiptPrint" class="receipt"><h2>${club.nombre}</h2><p><b>Comprobante:</b> ${p.comprobante}</p><hr style="margin:20px 0"><p><b>Socio:</b> ${p.socio}</p><p><b>Mes:</b> ${p.mes} ${p.anio}</p><p><b>Monto:</b> ${money(p.monto)}</p><p><b>Fecha:</b> ${p.fecha}</p><button class="btn dark" onclick="window.print()">Descargar PDF</button><button class="btn" onclick="cerrarModal()">Cerrar</button></div>`
  modal.classList.add('show')
}

function abrirQR(id){
  const s=socios.find(x=>x.id===id)
  const data=encodeURIComponent(`${s.codigo}|${s.nombre}|${s.rut}`)
  modal.innerHTML=`<div class="card" style="text-align:center"><h3>QR SOCIO</h3><p>${s.nombre}</p><div style="background:white;padding:18px;border-radius:14px;display:inline-block;margin:20px"><img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${data}"></div><br><button class="btn gold" onclick="cerrarModal()">Cerrar</button></div>`
  modal.classList.add('show')
}

function exportCSV(){
  const rows=[['Codigo','Nombre','RUT','Telefono','Categoria','Estado','Cuota'],...socios.map(s=>[s.codigo,s.nombre,s.rut,s.telefono,s.categoria,s.estado,s.cuota])]
  const csv=rows.map(r=>r.join(';')).join('\n')
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'})
  const url=URL.createObjectURL(blob)
  const a=document.createElement('a');a.href=url;a.download='reporte_socios_ricardo_mendez.csv';a.click();URL.revokeObjectURL(url)
}
